title: "Catálogo Nacional de Modelos de Dados — Territórios Inteligentes"
description: >-
  Instrumento de referência para a interoperabilidade, harmonização e
  qualidade dos dados publicados pelas entidades públicas no âmbito dos
  Territórios Inteligentes.
lang: pt-PT
locale: pt_PT

baseurl: "/CATALOGO_MODELOS_DADOS_TI"
url: "https://amagovpt.github.io"

theme: jekyll-theme-cayman

# Navegação principal (usada no layout / header, se o tema suportar
# inclui via _includes/nav.html ou navegação manual nas páginas)
nav:
  - title: Início
    url: /
  - title: Categorias
    url: /categorias/
  - title: FAQ
    url: /faq/
  - title: Sobre
    url: /sobre/

# Metadados sociais
github_username: amagovpt
repository: amagovpt/CATALOGO_MODELOS_DADOS_TI

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
